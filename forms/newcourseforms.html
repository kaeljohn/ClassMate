 <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f3eefc;
            margin: 0;
        }

        .form-container {
            max-width: 800px;
            margin: auto;
            margin-top: 0px;
        }

        .form-header {
            background: #ffffff;
            border-radius: 8px;
            padding: 24px;
            border-top: 10px solid #3a53b7;
            margin-bottom: 16px;
        }

        .form-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 500;
        }

        .form-header p {
            margin-top: 8px;
            font-size: 14px;
            color: #444;
        }

        .required {
            color: red;
            font-size: 13px;
            margin-top: 8px;
        }

        .form-card {
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .form-card label {
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
        }

        .form-card small {
            color: #666;
            font-size: 13px;
            display: block;
            margin-bottom: 12px;
        }   

        .form-card input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            font-size: 16px;
            padding: 8px 4px;
            outline: none;
        }

        .form-card input:focus {
            border-bottom: 2px solid #3a53b7;
        }

        .submit-btn {
            background: #3a53b7;
            color: #fff;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #3a53b7;
        }

        .footer {
            font-size: 12px;
            color: #666;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="form-container">

        <!-- Header -->
        <div class="form-header">
            <h1>Make a New Course</h1>
            <p>
                All of the submissions to this form will be appended into a table as
                signatures in the style of an open letter.
            </p>
            <div class="required">* Required</div>
        </div>

        <!-- Course Name -->
        <div class="form-card">
            <label>Course Name *</label>
           
            <input type="text" placeholder="Your answer" required>
        </div>

        <!-- Course Code -->
        <div class="form-card">
            <label>Course Code *</label>
            <input type="text" placeholder="Your answer" required>
        </div>

        

        <!-- Submit -->
        <button class="btn btn-primary" onclick="window.location.href=' '">Submit</button>

        

    </div>
    
</body>
